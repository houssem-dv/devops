apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  # Use NodePort to expose the service outside the cluster
  type: NodePort
  selector:
    # This must match the 'app' label in your MySQL Pod/Deployment definition
    app: mysql
  ports:
    - protocol: TCP
      # The port the service exposes within the cluster
      port: 3306
      # The port on the Pods that the traffic will be forwarded to (MySQL default port)
      targetPort: 3306
      # Optional: you can specify a specific NodePort (range 30000-32767)
      # If omitted, Kubernetes will automatically assign one
      nodePort: 30306
